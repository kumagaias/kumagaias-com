<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a90c8"/>
      <stop offset="100%" stop-color="#80d8f5"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="32" height="32" fill="url(#sky)"/>

  <!-- Ground -->
  <rect x="0" y="27" width="32" height="5" fill="#4aaa4a"/>
  <rect x="0" y="27" width="32" height="1.2" fill="#5ec05e"/>

  <!-- Sun (top-left) -->
  <circle cx="4" cy="4" r="3" fill="#ffd740"/>

  <!-- Support A-frame legs -->
  <line x1="16" y1="13" x2="10.5" y2="27" stroke="#cc3333" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="13" x2="21.5" y2="27" stroke="#cc3333" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Cross brace -->
  <line x1="12.2" y1="23" x2="19.8" y2="23" stroke="#cc3333" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Ferris wheel outer ring (center 16,13 radius 11) -->
  <circle cx="16" cy="13" r="11" fill="rgba(255,255,255,0.07)" stroke="#f5c200" stroke-width="2"/>

  <!-- 8 spokes -->
  <g stroke="#f5c200" stroke-width="0.9">
    <line x1="16" y1="13" x2="16"    y2="2"/>
    <line x1="16" y1="13" x2="23.78" y2="5.22"/>
    <line x1="16" y1="13" x2="27"    y2="13"/>
    <line x1="16" y1="13" x2="23.78" y2="20.78"/>
    <line x1="16" y1="13" x2="16"    y2="24"/>
    <line x1="16" y1="13" x2="8.22"  y2="20.78"/>
    <line x1="16" y1="13" x2="5"     y2="13"/>
    <line x1="16" y1="13" x2="8.22"  y2="5.22"/>
  </g>

  <!-- Center hub -->
  <circle cx="16" cy="13" r="1.8" fill="#f5c200"/>
  <circle cx="16" cy="13" r="0.7" fill="#cc9900"/>

  <!-- 8 Gondolas — centered on ring points -->
  <!-- Top (16, 2) -->
  <rect x="14.4" y="0.6" width="3.2" height="2.6" rx="0.6" fill="#ff4d77"/>
  <!-- Top-right (23.78, 5.22) -->
  <rect x="22.18" y="3.92" width="3.2" height="2.6" rx="0.6" fill="#4499ff"/>
  <!-- Right (27, 13) -->
  <rect x="25.5"  y="11.7" width="3.2" height="2.6" rx="0.6" fill="#ff9922"/>
  <!-- Bottom-right (23.78, 20.78) -->
  <rect x="22.18" y="19.48" width="3.2" height="2.6" rx="0.6" fill="#44cc55"/>
  <!-- Bottom (16, 24) -->
  <rect x="14.4"  y="22.7" width="3.2" height="2.6" rx="0.6" fill="#bb44ff"/>
  <!-- Bottom-left (8.22, 20.78) -->
  <rect x="6.62"  y="19.48" width="3.2" height="2.6" rx="0.6" fill="#ff3333"/>
  <!-- Left (5, 13) -->
  <rect x="3.3"   y="11.7" width="3.2" height="2.6" rx="0.6" fill="#22ddee"/>
  <!-- Top-left (8.22, 5.22) -->
  <rect x="6.62"  y="3.92" width="3.2" height="2.6" rx="0.6" fill="#ffee33"/>
</svg>
